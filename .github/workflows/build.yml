name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # === DEBUG: ببین فایل‌های assets کجان ===
      - name: Debug - Check assets structure
        run: |
          echo "=== Root folder ==="
          ls -la
          echo ""
          echo "=== app/src/main ==="
          ls -la app/src/main/ || echo "NOT FOUND"
          echo ""
          echo "=== app/src/main/assets ==="
          ls -laR app/src/main/assets/ || echo "assets folder NOT FOUND!"
          echo ""
          echo "=== Searching for index.html everywhere ==="
          find . -name "index.html" || echo "index.html NOT FOUND anywhere!"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30 